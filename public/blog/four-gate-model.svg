<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 220" role="img" aria-labelledby="fgt fgd">
  <title id="fgt">Four-gate authorization model</title>
  <desc id="fgd">A call from a remote machine passes through four sequential authorization gates — Connection, Credential, Service, Method — before the handler runs.</desc>

  <style>
    /* Soft autoplay: a pulse travels along the connection.
       Each time it crosses a gate, the gate's solid fill covers it,
       producing a natural visible/hidden rhythm — visualising the call
       being inspected at each checkpoint. */
    .pulse {
      fill: #E6C06B;
      filter: drop-shadow(0 0 5px rgba(230, 192, 107, 0.85));
      animation: fg-flow 8s linear infinite;
    }
    @keyframes fg-flow {
      0%   { transform: translateX(0px);   opacity: 0; }
      5%   { opacity: 1; }
      94%  { opacity: 1; }
      100% { transform: translateX(754px); opacity: 0; }
    }

    /* All six checkpoints get a pointer cursor on hover. */
    .checkpoint { cursor: pointer; }

    /* Hover affordance — gentle stroke + glow on each gate. */
    .gate-ring {
      transition: stroke-width 0.28s ease, filter 0.28s ease;
    }
    .gate-inner {
      transition: opacity 0.28s ease;
    }
    .endpoint-shape {
      transition: stroke-width 0.28s ease, filter 0.28s ease;
    }
    .endpoint-blue:hover .endpoint-shape {
      stroke-width: 3.25;
      filter: drop-shadow(0 0 10px rgba(120, 166, 255, 0.55));
    }
    .endpoint-mint:hover .endpoint-shape {
      stroke-width: 3.25;
      filter: drop-shadow(0 0 10px rgba(97, 214, 194, 0.55));
    }
    .gate-blue:hover .gate-ring {
      stroke-width: 3.25;
      filter: drop-shadow(0 0 10px rgba(120, 166, 255, 0.55));
    }
    .gate-mint:hover .gate-ring {
      stroke-width: 3.25;
      filter: drop-shadow(0 0 10px rgba(97, 214, 194, 0.55));
    }
    .gate-blue:hover .gate-inner,
    .gate-mint:hover .gate-inner {
      opacity: 0.78;
    }

    @media (prefers-reduced-motion: reduce) {
      .pulse { animation: none; opacity: 0; }
      .gate-ring { transition: none; }
    }
  </style>

  <defs>
    <linearGradient id="fg-flow" x1="56" y1="0" x2="888" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#78A6FF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#61D6C2" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- flow segments between checkpoints -->
  <line x1="86" y1="100" x2="176" y2="100" stroke="url(#fg-flow)" stroke-width="2.5"/>
  <line x1="252" y1="100" x2="336" y2="100" stroke="url(#fg-flow)" stroke-width="2.5"/>
  <line x1="412" y1="100" x2="496" y2="100" stroke="url(#fg-flow)" stroke-width="2.5"/>
  <line x1="572" y1="100" x2="656" y2="100" stroke="url(#fg-flow)" stroke-width="2.5"/>
  <line x1="732" y1="100" x2="840" y2="100" stroke="url(#fg-flow)" stroke-width="2.5"/>

  <!-- traveling pulse — placed BEFORE the gates so they cover it as it passes through -->
  <circle class="pulse" cx="86" cy="100" r="4.5"/>

  <!-- entry: calling machine (brand-mark riff) -->
  <g class="checkpoint endpoint-blue" transform="translate(56, 100)">
    <polygon class="endpoint-shape" points="0,-26 26,0 0,26 -26,0"
             stroke="#78A6FF" stroke-width="2.5"
             fill="#0B0F14" stroke-linejoin="round"/>
    <rect x="-15" y="-15" width="30" height="30" rx="1"
          stroke="#61D6C2" stroke-width="1.5" opacity="0.85"
          fill="none" stroke-linejoin="round"/>
    <circle r="3.5" fill="#E6C06B"/>
  </g>

  <!-- gate 1: Connection (cloud blue — establishing identity) -->
  <g class="checkpoint gate-blue" transform="translate(214, 100)">
    <circle class="gate-ring" r="34" fill="#0B0F14" stroke="#78A6FF" stroke-width="2.5"/>
    <circle class="gate-inner" r="26" fill="none" stroke="#78A6FF" stroke-width="1" opacity="0.42"/>
    <text y="6" text-anchor="middle" font-family="IBM Plex Mono, monospace"
          font-size="18" font-weight="600" fill="#E6C06B">1</text>
  </g>
  <text x="214" y="178" text-anchor="middle"
        font-family="Geist, system-ui, sans-serif" font-size="13"
        font-weight="500" fill="#A5B3C2" letter-spacing="0.04em">Connection</text>

  <!-- gate 2: Credential (cloud blue — verifying identity) -->
  <g class="checkpoint gate-blue" transform="translate(374, 100)">
    <circle class="gate-ring" r="34" fill="#0B0F14" stroke="#78A6FF" stroke-width="2.5"/>
    <circle class="gate-inner" r="26" fill="none" stroke="#78A6FF" stroke-width="1" opacity="0.42"/>
    <text y="6" text-anchor="middle" font-family="IBM Plex Mono, monospace"
          font-size="18" font-weight="600" fill="#E6C06B">2</text>
  </g>
  <text x="374" y="178" text-anchor="middle"
        font-family="Geist, system-ui, sans-serif" font-size="13"
        font-weight="500" fill="#A5B3C2" letter-spacing="0.04em">Credential</text>

  <!-- gate 3: Service (mint — applying identity to authorization) -->
  <g class="checkpoint gate-mint" transform="translate(534, 100)">
    <circle class="gate-ring" r="34" fill="#0B0F14" stroke="#61D6C2" stroke-width="2.5"/>
    <circle class="gate-inner" r="26" fill="none" stroke="#61D6C2" stroke-width="1" opacity="0.42"/>
    <text y="6" text-anchor="middle" font-family="IBM Plex Mono, monospace"
          font-size="18" font-weight="600" fill="#E6C06B">3</text>
  </g>
  <text x="534" y="178" text-anchor="middle"
        font-family="Geist, system-ui, sans-serif" font-size="13"
        font-weight="500" fill="#A5B3C2" letter-spacing="0.04em">Service</text>

  <!-- gate 4: Method (mint — final authorization scope) -->
  <g class="checkpoint gate-mint" transform="translate(694, 100)">
    <circle class="gate-ring" r="34" fill="#0B0F14" stroke="#61D6C2" stroke-width="2.5"/>
    <circle class="gate-inner" r="26" fill="none" stroke="#61D6C2" stroke-width="1" opacity="0.42"/>
    <text y="6" text-anchor="middle" font-family="IBM Plex Mono, monospace"
          font-size="18" font-weight="600" fill="#E6C06B">4</text>
  </g>
  <text x="694" y="178" text-anchor="middle"
        font-family="Geist, system-ui, sans-serif" font-size="13"
        font-weight="500" fill="#A5B3C2" letter-spacing="0.04em">Method</text>

  <!-- exit: handler runs -->
  <g class="checkpoint endpoint-mint" transform="translate(866, 100)">
    <rect class="endpoint-shape" x="-22" y="-22" width="44" height="44" rx="3"
          stroke="#61D6C2" stroke-width="2.5"
          fill="#0B0F14"/>
    <text y="5" text-anchor="middle" font-family="IBM Plex Mono, monospace"
          font-size="15" font-weight="600" fill="#61D6C2">{ }</text>
  </g>
</svg>
